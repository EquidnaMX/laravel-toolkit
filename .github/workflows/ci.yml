name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3', '8.4', '8.5']
        laravel-version: ['12.*', '13.*']
        exclude:
          - php-version: '8.2'
            laravel-version: '13.*'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer
          extensions: mbstring, dom, json

      - name: Configure Laravel version
        run: |
          rm -f composer.lock
          composer require "laravel/framework:${{ matrix.laravel-version }}" "illuminate/support:${{ matrix.laravel-version }}" --no-interaction --no-update

      - name: Install dependencies
        run: composer update --with-all-dependencies --no-interaction --prefer-dist --no-progress

      - name: Run PHPUnit
        run: vendor/bin/phpunit

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse -c phpstan.neon

      - name: Run PHPCS
        run: vendor/bin/phpcs --standard=ruleset.xml

      - name: Run Composer audit
        run: composer audit --locked
